<div class="timeline" #container (scroll)="syncTimelineScroll($event)" (pointermove)="onContainerPointerMove($event)" (pointerleave)="onContainerPointerLeave()">
  <!-- Sticky header: time markers + labels + scrubber -->
  <div class="header-container" [style.width]="timelineTotalWidthPx">
    <div class="time-row">
      <div class="time-markers">
        <app-timeline-time-markers
          [isHeader]="true"
          [zoom]="zoom()"
          [maxMs]="maxMs"
          [step]="stepMs"
          [printEveryMs]="printEveryMs"
          [visibleStartMs]="visibleStartMs()"
          [visibleEndMs]="visibleEndMs()"
        />
      </div>
      <div class="time-labels">
        <app-timeline-time-labels
          [zoom]="zoom()"
          [maxMs]="maxMs"
          [step]="stepMs"
          [stepPx]="stepPx"
          precision="timeline"
          [printEveryMs]="printEveryMs"
          [visibleStartMs]="visibleStartMs()"
          [visibleEndMs]="visibleEndMs()"
        />
      </div>
    </div>

    <!-- Playhead indicator (triangle) -->
    <div
      #cursorTime
      id="cursor-time"
      [class.cursor-animation]="hasCursorAnimation"
    ></div>

    <!-- Scrubber input -->
    <input
      id="slider"
      type="range"
      min="0"
      [step]="stepMs"
      [max]="maxMs"
      [value]="time()"
      (mousedown)="onSliderMouseDown()"
      (mouseup)="onSliderMouseUp()"
      (keydown)="onSliderMouseDown()"
      (keyup)="onSliderMouseUp()"
      (input)="onSliderChange($event)"
    />
  </div>

  <!-- Layer rows -->
  <div #layersContainer class="layers-container" [style.width]="timelineTotalWidthPx">
    <div class="layers">
      <div class="layer-spacer" [style.height.px]="topSpacerHeightPx()"></div>
      @for (layer of visibleLayers(); track trackLayers(0, layer)) {
        <div
          class="layer-row"
          [class.is-selected]="false"
          [class.is-visible]="layer.visible ?? true"
          [class.is-locked]="layer.locked"
        >
          <app-timeline-time-markers
            [isHeader]="false"
            [zoom]="zoom()"
            [maxMs]="maxMs"
            [step]="stepMs"
            [printEveryMs]="printEveryMs"
            [visibleStartMs]="visibleStartMs()"
            [visibleEndMs]="visibleEndMs()"
          />
          <app-timeline-track-layer
            class="layer"
            [layer]="layer"
            [isLocked]="!!layer.locked"
            [stepPx]="stepPx"
            [maxMs]="maxMs"
            [step]="stepMs"
            [zoom]="zoom()"
            (layerChanged)="onLayerChanged($event)"
            (dragActiveChanged)="onLayerDragActiveChanged($event)"
            (pointerdown)="onLayerClicked(layer)"
          />
        </div>
      }
      <div class="layer-spacer" [style.height.px]="bottomSpacerHeightPx()"></div>
    </div>
  </div>

  <!-- Playhead cursor line -->
  <div
    class="cursor-container"
    [style.width]="timelineTotalWidthPx"
    [style.height]="timelineCursorHeight"
  >
    <div
      #cursor
      id="cursor"
      [class.cursor-animation]="hasCursorAnimation"
      [style.height]="timelineCursorHeight"
    ></div>
  </div>
</div>
