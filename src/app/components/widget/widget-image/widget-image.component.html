@if (isUrlValid) {
    <img
        class="widget-image-content"
        [src]="content().src"
        [alt]="content().alt || 'Contenuto widget'"
        [style.object-fit]="content().fitMode"
        [style.object-position]="coverObjectPosition()"
        crossorigin="anonymous"
        referrerpolicy="no-referrer"
        draggable="false"
    />
} @else {
    <div class="widget-image-placeholder">Inserisci un URL immagine valido (http/https)</div>
}
