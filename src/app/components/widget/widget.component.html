<div class="widget-content-wrapper">
    @if (textContent; as content) {
        <div
            #textContentEl
            class="widget-content widget-content--text"
            [style.font-size.px]="textComputedFontSize"
            [style.font-family]="textComputedFontFamily"
            [style.color]="textComputedColor"
            [style.align-items]="textHorizontalAlignStyle"
            [style.justify-content]="textVerticalAlignStyle"
            [style.text-align]="content.style.alignHorizontal"
            [style.white-space]="textWhiteSpaceStyle"
            [style.overflow-wrap]="textOverflowWrapStyle"
        >{{ content.text }}
        </div>
    } @else {
        @if (imageContent && isImageUrlValid) {
            <img
                    class="widget-content widget-content--image"
                    [src]="imageContent.src"
                    [alt]="imageContent.alt || 'Contenuto widget'"
                    [style.object-fit]="imageContent.fitMode"
                    draggable="false"
            />
        } @else {
            <div class="widget-content widget-content--placeholder">Inserisci un URL immagine valido (http/https)</div>
        }
    }

    @if (activeDebug()) {
        <div class="widget-debug-info">
            <ng-content></ng-content>
        </div>
    }
</div>
