@if (isUrlValid) {
    <video
        class="widget-video-content"
        [src]="content().src"
        [poster]="content().poster || null"
        [style.object-fit]="mediaObjectFit()"
        [style.object-position]="coverObjectPosition()"
        [style.transform]="mediaTransform()"
        [style.transform-origin]="mediaTransformOrigin()"
        [autoplay]="content().autoplay"
        [loop]="content().loop"
        [muted]="content().muted"
        [controls]="content().controls"
        crossorigin="anonymous"
        preload="auto"
        playsinline
        (loadedmetadata)="onVideoMetadataReady($event)"
        (loadeddata)="onVideoReady($event)"
        (play)="onVideoPlaybackChanged(true)"
        (pause)="onVideoPlaybackChanged(false)"
        (ended)="onVideoPlaybackChanged(false)"
        (timeupdate)="onVideoTimeUpdate($event)"
        (durationchange)="onVideoDurationChange($event)"
        (volumechange)="onVideoVolumeChange($event)"
    ></video>
} @else {
    <div class="widget-video-placeholder">Provide a valid video URL (http/https).</div>
}
